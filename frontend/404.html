<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – Page Not Found | EventSphere</title>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--orange:#F5A623;--orange-dark:#E09400;--text-dark:#1A1A2E;--text-mid:#555;--text-light:#999;--bg:#F9F9F9;--bg-white:#fff;--border:#E8E8E8;}
    [data-theme="dark"]{--text-dark:#F0F0F0;--text-mid:#CCC;--text-light:#888;--bg:#0F0F0F;--bg-white:#1C1C1C;--border:#2E2E2E;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text-dark);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
    .num{font-family:'Clash Display',sans-serif;font-size:clamp(100px,20vw,180px);font-weight:700;color:var(--orange);line-height:1;opacity:0.15;position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);pointer-events:none;user-select:none;}
    .wrap{position:relative;z-index:1;max-width:480px;}
    .icon{font-size:72px;margin-bottom:16px;display:block;}
    h1{font-family:'Clash Display',sans-serif;font-size:32px;font-weight:700;margin-bottom:10px;}
    p{font-size:15px;color:var(--text-mid);line-height:1.7;margin-bottom:32px;}
    .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
    .btn-home{background:var(--orange);color:#fff;border:none;border-radius:10px;padding:13px 28px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;box-shadow:0 4px 16px rgba(245,166,35,0.3);transition:all 0.2s;}
    .btn-home:hover{background:var(--orange-dark);transform:translateY(-1px);}
    .btn-events{background:var(--bg-white);color:var(--text-dark);border:1.5px solid var(--border);border-radius:10px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;transition:all 0.2s;}
    .btn-events:hover{border-color:var(--orange);color:var(--orange);}
    .suggestions{margin-top:40px;text-align:left;background:var(--bg-white);border:1px solid var(--border);border-radius:14px;padding:20px 24px;}
    .suggestions p{font-size:13px;font-weight:700;color:var(--text-dark);margin-bottom:10px;}
    .suggestions a{display:block;font-size:13.5px;color:var(--orange);text-decoration:none;padding:5px 0;border-bottom:1px solid var(--border);}
    .suggestions a:last-child{border-bottom:none;}
    .suggestions a:hover{text-decoration:underline;}
    @media(max-width:480px){.btns{flex-direction:column;}.btn-home,.btn-events{text-align:center;}}
  </style>
</head>
<body>
<div class="num">404</div>
<div class="wrap">
  <span class="icon">🗺️</span>
  <h1>Page Not Found</h1>
  <p>Oops! The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <div class="btns">
    <a href="index.html" class="btn-home">🏠 Go Home</a>
    <a href="events.html" class="btn-events">📅 Browse Events</a>
  </div>
  <div class="suggestions">
    <p>You might be looking for:</p>
    <a href="events.html">📅 All Events</a>
    <a href="login.html">🔐 Login</a>
    <a href="signup.html">✍️ Sign Up</a>
    <a href="dashboard.html">📊 My Dashboard</a>
    <a href="contact.html">📬 Contact Us</a>
  </div>
</div>
<script>
  if(localStorage.getItem('theme')==='dark') document.documentElement.setAttribute('data-theme','dark');
</script>
</body>
</html>
