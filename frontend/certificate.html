<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Certificate – EventSphere</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#F5A623"/>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});</script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --orange:#F5A623; --orange-dark:#E09400; --gold:#C8951A; }
    [data-theme="dark"] { --bg:#0F0F0F; --card:#1C1C1C; --text:#F0F0F0; --sub:#aaa; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Plus Jakarta Sans',sans-serif;
      background:#F2F4F7; min-height:100vh;
      display:flex; flex-direction:column;
    }
    [data-theme="dark"] body { background:#0F0F0F; color:#F0F0F0; }

    nav {
      position:sticky; top:0; z-index:100;
      background:#fff; border-bottom:1px solid #e2e6ea;
      padding:0 48px; height:64px;
      display:flex; align-items:center; justify-content:space-between;
    }
    [data-theme="dark"] nav { background:#1C1C1C; border-color:#2e2e2e; }
    .nav-logo { display:flex; align-items:center; gap:8px; text-decoration:none; font-weight:700; font-size:20px; color:inherit; }
    .nav-logo svg { color:var(--orange); }
    .nav-right { display:flex; align-items:center; gap:12px; }
    .dark-toggle { background:none; border:none; cursor:pointer; color:#555; padding:6px; border-radius:50%; font-size:18px; }

    main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; }

    /* CERTIFICATE */
    .cert-wrapper { max-width:760px; width:100%; }
    .cert-actions { display:flex; gap:12px; justify-content:center; margin-bottom:24px; }
    .cert-btn {
      padding:10px 24px; border-radius:10px; border:none; cursor:pointer;
      font-size:14px; font-weight:600; font-family:inherit;
      display:flex; align-items:center; gap:8px;
      transition:transform 0.15s, box-shadow 0.15s;
    }
    .cert-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.1); }
    .cert-btn.primary { background:var(--orange); color:#fff; }
    .cert-btn.secondary { background:#fff; color:#333; border:1.5px solid #ddd; }
    [data-theme="dark"] .cert-btn.secondary { background:#2a2a2a; color:#eee; border-color:#3a3a3a; }

    .certificate {
      background:#fff;
      border:12px solid var(--gold);
      border-radius:4px;
      padding:60px 64px;
      text-align:center;
      position:relative;
      box-shadow:0 20px 60px rgba(0,0,0,0.15), inset 0 0 0 4px #fff, inset 0 0 0 6px var(--gold);
    }
    .cert-corner {
      position:absolute; width:48px; height:48px;
      border:3px solid var(--gold); border-radius:2px;
    }
    .cert-corner.tl { top:14px; left:14px; border-right:none; border-bottom:none; }
    .cert-corner.tr { top:14px; right:14px; border-left:none; border-bottom:none; }
    .cert-corner.bl { bottom:14px; left:14px; border-right:none; border-top:none; }
    .cert-corner.br { bottom:14px; right:14px; border-left:none; border-top:none; }

    .cert-logo { font-size:36px; margin-bottom:6px; }
    .cert-brand { font-size:18px; font-weight:700; color:var(--gold); letter-spacing:3px; text-transform:uppercase; margin-bottom:20px; }
    .cert-divider { width:60px; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:0 auto 20px; }

    .cert-heading {
      font-family:'Playfair Display',serif;
      font-size:34px; font-weight:700; color:#1A1A2E;
      margin-bottom:8px; letter-spacing:-0.5px;
    }
    .cert-subheading { font-size:13px; color:#888; letter-spacing:2px; text-transform:uppercase; margin-bottom:32px; }

    .cert-body { font-size:16px; color:#555; line-height:1.7; margin-bottom:10px; }
    .cert-name {
      font-family:'Playfair Display',serif;
      font-size:40px; font-weight:700; color:var(--orange);
      border-bottom:2px solid #FFE4A0; padding-bottom:6px; display:inline-block;
      margin:8px 0 24px;
    }
    .cert-event-label { font-size:14px; color:#888; margin-bottom:6px; }
    .cert-event {
      font-family:'Playfair Display',serif;
      font-size:24px; font-weight:600; color:#1A1A2E; margin-bottom:24px;
    }

    .cert-meta {
      display:flex; justify-content:center; gap:40px;
      margin:24px 0; flex-wrap:wrap;
    }
    .cert-meta-item { text-align:center; }
    .cert-meta-label { font-size:11px; color:#aaa; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px; }
    .cert-meta-value { font-size:14px; font-weight:600; color:#333; }

    .cert-divider2 { height:1px; background:linear-gradient(90deg,transparent,#e0e0e0,transparent); margin:24px 0; }

    .cert-footer { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:20px; }
    .cert-sig { text-align:center; }
    .cert-sig-line { width:120px; height:1px; background:#ccc; margin:0 auto 6px; }
    .cert-sig-name { font-size:12px; font-weight:600; color:#555; }
    .cert-sig-title { font-size:11px; color:#aaa; }

    .cert-qr img { width:90px; height:90px; }
    .cert-id { font-size:11px; color:#aaa; margin-top:4px; }

    .cert-stamp {
      position:absolute; top:50%; right:60px; transform:translateY(-50%);
      width:90px; height:90px; border:3px solid rgba(245,166,35,0.3);
      border-radius:50%; display:flex; align-items:center; justify-content:center;
      flex-direction:column; color:rgba(245,166,35,0.4); font-size:9px;
      font-weight:700; letter-spacing:1px; text-align:center; pointer-events:none;
    }

    footer {
      background:#fff; border-top:1px solid #e2e6ea;
      padding:20px 48px; text-align:center;
      display:flex; align-items:center; justify-content:space-between;
      font-size:13px; color:#aaa;
    }
    [data-theme="dark"] footer { background:#1C1C1C; border-color:#2e2e2e; }
    .footer-logo { display:flex; align-items:center; gap:6px; text-decoration:none; font-weight:700; color:#F5A623; }
    .footer-links { display:flex; gap:16px; }
    .footer-links a { color:#aaa; text-decoration:none; }
    .footer-links a:hover { color:var(--orange); }

    @media print {
      nav, footer, .cert-actions { display:none !important; }
      body { background:#fff !important; }
      main { padding:0 !important; }
      .certificate { box-shadow:none !important; border-width:8px; }
    }
    @media(max-width:600px) {
      .certificate { padding:36px 24px; }
      .cert-name { font-size:28px; }
      .cert-heading { font-size:24px; }
      .cert-footer { flex-direction:column; align-items:center; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      EventSphere
    </a>
    <div class="nav-right">
      <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">🌙</button>
    </div>
  </nav>

  <main>
    <div class="cert-wrapper">
      <div class="cert-actions" id="certActions">
        <button class="cert-btn primary" id="downloadBtn" onclick="downloadCertPDF()">📄 Download PDF</button>
        <button class="cert-btn secondary" onclick="window.print()">🖨️ Print</button>
        <button class="cert-btn secondary" onclick="shareOrCopy()">🔗 Share Certificate</button>
        <button class="cert-btn secondary" onclick="history.back()">← Back</button>
      </div>

      <div class="certificate" id="certificate">
        <div class="cert-corner tl"></div>
        <div class="cert-corner tr"></div>
        <div class="cert-corner bl"></div>
        <div class="cert-corner br"></div>

        <div class="cert-logo">🏆</div>
        <div class="cert-brand">EventSphere</div>
        <div class="cert-divider"></div>

        <div class="cert-heading">Certificate of Participation</div>
        <div class="cert-subheading">This is to certify that</div>

        <div class="cert-name" id="certName">—</div>

        <div class="cert-body">has successfully participated in</div>
        <div class="cert-event-label">EVENT</div>
        <div class="cert-event" id="certEvent">—</div>

        <div class="cert-meta">
          <div class="cert-meta-item">
            <div class="cert-meta-label">Date</div>
            <div class="cert-meta-value" id="certDate">—</div>
          </div>
          <div class="cert-meta-item">
            <div class="cert-meta-label">Category</div>
            <div class="cert-meta-value" id="certCategory">—</div>
          </div>
          <div class="cert-meta-item">
            <div class="cert-meta-label">City</div>
            <div class="cert-meta-value" id="certCity">—</div>
          </div>
        </div>

        <div class="cert-divider2"></div>

        <div class="cert-footer">
          <div class="cert-sig">
            <div class="cert-sig-line"></div>
            <div class="cert-sig-name">EventSphere Team</div>
            <div class="cert-sig-title">Organising Committee</div>
          </div>
          <div class="cert-qr" id="certQR">
            <img src="" alt="QR Code" id="certQRImg"/>
            <div class="cert-id" id="certIdText">—</div>
          </div>
          <div class="cert-sig">
            <div class="cert-sig-line"></div>
            <div class="cert-sig-name">Verified & Issued</div>
            <div class="cert-sig-title">EventSphere Platform</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <a href="index.html" class="footer-logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      EventSphere
    </a>
    <p>© 2026 EventSphere. All rights reserved.</p>
    <div class="footer-links"><a href="about.html">About</a><a href="contact.html">Contact</a></div>
  </footer>

  <script>
    // Dark mode
    const html = document.documentElement;
    const toggle = document.getElementById('darkToggle');
    if (localStorage.getItem('theme') === 'dark') { html.setAttribute('data-theme','dark'); toggle.textContent='☀️'; }
    toggle.addEventListener('click', () => {
      const dark = html.getAttribute('data-theme') === 'dark';
      dark ? html.removeAttribute('data-theme') : html.setAttribute('data-theme','dark');
      toggle.textContent = dark ? '🌙' : '☀️';
      localStorage.setItem('theme', dark ? 'light' : 'dark');
    });

    // Parse URL params
    const p = new URLSearchParams(location.search);
    const certUser  = p.get('user')  || 'Participant';
    const certEvent = p.get('event') || 'EventSphere Event';
    const certDate  = p.get('date')  || '';
    const certCity  = p.get('city')  || 'India';
    const certCat   = p.get('cat')   || 'Technical';
    const certId    = p.get('id')    || ('CERT-' + Math.random().toString(36).substr(2,8).toUpperCase());

    document.getElementById('certName').textContent     = certUser;
    document.getElementById('certEvent').textContent    = certEvent;
    document.getElementById('certCategory').textContent = certCat;
    document.getElementById('certCity').textContent     = certCity;
    document.getElementById('certIdText').textContent   = certId;

    if (certDate) {
      const d = new Date(certDate);
      if (!isNaN(d)) {
        document.getElementById('certDate').textContent = d.toLocaleDateString('en-IN', { day:'2-digit', month:'long', year:'numeric' });
      }
    } else {
      document.getElementById('certDate').textContent = 'Completed';
    }

    const qrData = encodeURIComponent(certId + '|' + certUser + '|' + certEvent);
    document.getElementById('certQRImg').src = 'https://api.qrserver.com/v1/create-qr-code/?data=' + qrData + '&size=120x120&margin=6';

    document.title = 'Certificate – ' + certEvent + ' – EventSphere';

    async function shareOrCopy() {
      const url = location.href;
      const shareData = { title: 'My EventSphere Certificate', text: `I participated in ${certEvent}! Certificate ID: ${certId}`, url };
      try {
        if (navigator.share) { await navigator.share(shareData); }
        else { await navigator.clipboard.writeText(url); showToast('🔗 Link copied to clipboard!'); }
      } catch(e) {
        try { await navigator.clipboard.writeText(url); showToast('🔗 Link copied!'); } catch(e2) {}
      }
    }

    function showToast(msg) {
      let t = document.getElementById('es-toast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'es-toast';
        Object.assign(t.style, { position:'fixed', bottom:'28px', left:'50%', transform:'translateX(-50%) translateY(80px)', background:'#1A1A2E', color:'#fff', padding:'12px 24px', borderRadius:'10px', fontFamily:'inherit', fontSize:'14px', fontWeight:'600', zIndex:'9999', transition:'transform 0.3s', whiteSpace:'nowrap' });
        document.body.appendChild(t);
      }
      t.textContent = msg;
      setTimeout(() => { t.style.transform='translateX(-50%) translateY(0)'; }, 10);
      setTimeout(() => { t.style.transform='translateX(-50%) translateY(80px)'; }, 2500);
    }
  
// ── PDF Download via html2canvas + jsPDF ────────────────────────────────────
async function downloadCertPDF() {
  var btn = document.getElementById('downloadBtn');
  if (btn) { btn.disabled=true; btn.textContent='⏳ Generating PDF…'; }
  try {
    // Load libraries dynamically
    if (!window.html2canvas) {
      await new Promise(function(res,rej){
        var s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.onload=res; s.onerror=rej; document.head.appendChild(s);
      });
    }
    if (!window.jspdf) {
      await new Promise(function(res,rej){
        var s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        s.onload=res; s.onerror=rej; document.head.appendChild(s);
      });
    }
    var certEl = document.getElementById('certificate') || document.querySelector('.certificate');
    if (!certEl) { alert('Certificate not found.'); return; }
    var canvas = await html2canvas(certEl, { scale: 2, useCORS: true, backgroundColor: '#fff' });
    var imgData = canvas.toDataURL('image/png');
    var { jsPDF } = window.jspdf;
    var pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width/2, canvas.height/2] });
    pdf.addImage(imgData, 'PNG', 0, 0, canvas.width/2, canvas.height/2);
    var userName = document.getElementById('certName') ? document.getElementById('certName').textContent : 'certificate';
    pdf.save('EventSphere_Certificate_' + userName.replace(/\s+/g,'_') + '.pdf');
  } catch(e) {
    console.error('PDF error:', e);
    alert('PDF generation failed. Try using Print instead.');
  } finally {
    if (btn) { btn.disabled=false; btn.textContent='📄 Download PDF'; }
  }
}
</script>
</body>
</html>
