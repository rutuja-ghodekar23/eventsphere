<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile – EventSphere</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#F5A623"/>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});</script>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--orange:#F5A623;--orange-dark:#E09400;--orange-light:#FFF3DC;--text-dark:#1A1A2E;--text-mid:#555;--text-light:#999;--bg:#F9F9F9;--bg-white:#fff;--border:#E8E8E8;--shadow:0 4px 20px rgba(0,0,0,0.07);--radius:16px;--tr:0.25s ease;}
    [data-theme="dark"]{--text-dark:#F0F0F0;--text-mid:#CCC;--text-light:#888;--bg:#0F0F0F;--bg-white:#1C1C1C;--border:#2E2E2E;--orange-light:#3a2200;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text-dark);min-height:100vh;display:flex;flex-direction:column;}
    nav{background:var(--bg-white);border-bottom:1px solid var(--border);padding:0 48px;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,0.04);}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;font-family:'Clash Display',sans-serif;font-weight:700;font-size:20px;color:var(--text-dark);}
    .nav-logo svg{color:var(--orange);}
    .nav-right{display:flex;align-items:center;gap:14px;}
    .dark-btn{background:none;border:none;cursor:pointer;color:var(--text-mid);padding:6px;border-radius:50%;display:flex;}
    .btn-back{background:none;border:1.5px solid var(--border);border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-mid);font-family:inherit;text-decoration:none;transition:all var(--tr);}
    .btn-back:hover{border-color:var(--orange);color:var(--orange);}
    main{flex:1;padding:48px 24px;max-width:700px;margin:0 auto;width:100%;}
    /* Profile Card */
    .profile-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px;}
    .profile-banner{height:100px;background:linear-gradient(135deg,#F5A623,#E09400);}
    .profile-info{padding:0 28px 28px;position:relative;}
    .avatar{width:84px;height:84px;background:var(--bg-white);border:4px solid var(--bg-white);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Clash Display',sans-serif;font-size:32px;font-weight:700;color:var(--orange);background:var(--orange-light);margin-top:-42px;margin-bottom:14px;}
    .profile-name{font-family:'Clash Display',sans-serif;font-size:24px;font-weight:700;color:var(--text-dark);margin-bottom:4px;}
    .profile-email{font-size:14px;color:var(--text-light);margin-bottom:16px;}
    .profile-badge{display:inline-flex;align-items:center;gap:5px;background:var(--orange-light);color:var(--orange);font-size:12px;font-weight:700;padding:4px 12px;border-radius:50px;}
    /* Edit Form */
    .edit-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);}
    .edit-card h2{font-family:'Clash Display',sans-serif;font-size:18px;font-weight:700;margin-bottom:22px;display:flex;align-items:center;gap:8px;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .ff{margin-bottom:0;}
    .ff.full{grid-column:1/-1;}
    .ff label{display:block;font-size:12px;font-weight:700;color:var(--text-dark);margin-bottom:5px;letter-spacing:0.3px;}
    .ff input,.ff select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;color:var(--text-dark);background:var(--bg-white);outline:none;transition:border-color var(--tr);}
    .ff input:focus,.ff select:focus{border-color:var(--orange);}
    .ff input:disabled{background:var(--bg);color:var(--text-light);cursor:not-allowed;}
    .btn-save{width:100%;padding:13px;background:var(--orange);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:20px;box-shadow:0 4px 16px rgba(245,166,35,0.3);transition:all var(--tr);}
    .btn-save:hover{background:var(--orange-dark);transform:translateY(-1px);}
    .btn-save:disabled{opacity:0.65;cursor:not-allowed;transform:none;}
    /* Stats row */
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
    .stat-box{background:var(--bg-white);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;box-shadow:var(--shadow);}
    .stat-num{font-family:'Clash Display',sans-serif;font-size:28px;font-weight:700;color:var(--orange);}
    .stat-lbl{font-size:12px;color:var(--text-light);margin-top:3px;}
    /* Toast */
    .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(60px);background:#1d5c31;color:#fff;padding:10px 22px;border-radius:50px;font-size:13.5px;font-weight:500;opacity:0;z-index:999;transition:all 0.4s cubic-bezier(0.34,1.4,0.64,1);}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .toast.err{background:#9b1c1c;}
    footer{background:var(--bg-white);border-top:1px solid var(--border);padding:20px 48px;display:flex;align-items:center;justify-content:space-between;}
    .footer-logo{display:flex;align-items:center;gap:8px;font-family:'Clash Display',sans-serif;font-weight:700;font-size:16px;color:var(--text-dark);text-decoration:none;}
    .footer-logo svg{color:var(--orange);}
    .footer-copy{font-size:12.5px;color:var(--text-light);}
    @media(max-width:600px){nav{padding:0 16px;}main{padding:24px 16px;}.form-grid{grid-template-columns:1fr;}.stats-row{grid-template-columns:1fr 1fr;}footer{flex-direction:column;gap:10px;padding:16px;text-align:center;}}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
    EventSphere
  </a>
  <div class="nav-right">
    <button class="dark-btn" id="darkBtn"><svg id="darkIco" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
    <a href="dashboard.html" class="btn-back">← Dashboard</a>
  </div>
</nav>

<main>
  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-box"><div class="stat-num" id="statRegs">0</div><div class="stat-lbl">Registered Events</div></div>
    <div class="stat-box"><div class="stat-num" id="statFb">0</div><div class="stat-lbl">Feedback Given</div></div>
    <div class="stat-box"><div class="stat-num" id="statDays">0</div><div class="stat-lbl">Days as Member</div></div>
  </div>

  <!-- Profile Display -->
  <div class="profile-card">
    <div class="profile-banner"></div>
    <div class="profile-info">
      <div class="avatar" id="avatarLetter">?</div>
      <div class="profile-name" id="profileName">Loading…</div>
      <div class="profile-email" id="profileEmail"></div>
      <span class="profile-badge" id="profileRole">User</span>
    </div>
  </div>

  <!-- Edit Form -->
  <div class="edit-card">
    <h2>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      Edit Profile
    </h2>
    <div class="form-grid">
      <div class="ff"><label>Full Name</label><input type="text" id="fName" placeholder="Your name"/></div>
      <div class="ff"><label>Email (cannot change)</label><input type="email" id="fEmail" disabled/></div>
      <div class="ff"><label>College / Institute</label><input type="text" id="fCollege" placeholder="e.g. MIT Pune"/></div>
      <div class="ff"><label>City</label>
        <select id="fCity">
          <option value="">Select City</option>
          <option>Pune</option><option>Mumbai</option><option>Nagpur</option>
          <option>Bangalore</option><option>Delhi</option><option>Hyderabad</option>
          <option>Chennai</option><option>Kolkata</option><option>Other</option>
        </select>
      </div>
      <div class="ff full"><label>New Password (leave blank to keep current)</label><input type="password" id="fPass" placeholder="Min 6 characters"/></div>
    </div>
    <button class="btn-save" id="saveBtn" onclick="saveProfile()">💾 Save Changes</button>
  </div>
</main>

<footer>
  <a href="index.html" class="footer-logo"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>EventSphere</a>
  <p class="footer-copy">© 2026 EventSphere</p>
</footer>
<div class="toast" id="toast"></div>

<script>
var html=document.documentElement,dico=document.getElementById('darkIco');
var sunS='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
var monS='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
if(localStorage.getItem('theme')==='dark'){html.setAttribute('data-theme','dark');dico.innerHTML=sunS;}
document.getElementById('darkBtn').addEventListener('click',function(){var d=html.getAttribute('data-theme')==='dark';d?html.removeAttribute('data-theme'):html.setAttribute('data-theme','dark');dico.innerHTML=d?monS:sunS;localStorage.setItem('theme',d?'light':'dark');});

var user=JSON.parse(localStorage.getItem('user')||'null');
if(!user){window.location.href='login.html';}
var BURL=localStorage.getItem('backendURL')||(window.location.port==='5000'||window.location.port==='3000'?'':'http://localhost:5000');

function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type?' '+type:'');setTimeout(function(){t.className='toast';},3000);}

function loadProfile(){
  // Fill from localStorage first (instant)
  document.getElementById('profileName').textContent=user.name||'—';
  document.getElementById('profileEmail').textContent=user.email||'—';
  document.getElementById('avatarLetter').textContent=(user.name||'?')[0].toUpperCase();
  document.getElementById('profileRole').textContent=(user.role||'user').toUpperCase();
  document.getElementById('fName').value=user.name||'';
  document.getElementById('fEmail').value=user.email||'';
  document.getElementById('fCollege').value=user.college||'';
  document.getElementById('fCity').value=user.city||'';
  // Days as member (rough — from localStorage date or default)
  var joined=user.created_at?new Date(user.created_at):new Date();
  var days=Math.floor((new Date()-joined)/(1000*60*60*24));
  document.getElementById('statDays').textContent=Math.max(1,days);
  // Load stats from API
  fetch(BURL+'/api/registrations/my',{headers:{'Authorization':'Bearer '+(localStorage.getItem('token')||'')}})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){if(d)document.getElementById('statRegs').textContent=(d.registrations||[]).length;})
    .catch(function(){});
  fetch(BURL+'/api/feedback/my',{headers:{'Authorization':'Bearer '+(localStorage.getItem('token')||'')}})
    .then(function(r){return r.ok?r.json():null;})
    .then(function(d){if(d)document.getElementById('statFb').textContent=(d.feedbacks||[]).length;})
    .catch(function(){});
}

async function saveProfile(){
  var name=document.getElementById('fName').value.trim();
  var college=document.getElementById('fCollege').value.trim();
  var city=document.getElementById('fCity').value;
  var pass=document.getElementById('fPass').value;
  if(!name){toast('Name cannot be empty.','err');return;}
  var btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='Saving…';
  try{
    // Update localStorage immediately
    user.name=name;user.college=college;user.city=city;
    localStorage.setItem('user',JSON.stringify(user));
    // Try backend update (endpoint may not exist yet — graceful)
    await fetch(BURL+'/api/users/profile',{
      method:'PUT',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(localStorage.getItem('token')||'')},
      body:JSON.stringify({name,college,city,password:pass||undefined})
    });
    document.getElementById('profileName').textContent=name;
    document.getElementById('avatarLetter').textContent=name[0].toUpperCase();
    toast('✅ Profile updated successfully!');
  }catch(e){
    toast('Saved locally. Backend update failed.','err');
  }finally{
    btn.disabled=false;btn.textContent='💾 Save Changes';
  }
}

loadProfile();
</script>
</body>
</html>
