<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – EventSphere</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#F5A623"/>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});</script>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --orange:#F5A623; --orange-dark:#E09400; --text-dark:#1A1A2E; --text-mid:#555; --text-light:#999; --bg:#F2F4F7; --bg-white:#FFFFFF; --border:#E2E6EA; --radius:16px; --radius-sm:10px; --shadow:0 8px 40px rgba(0,0,0,0.08); --transition:0.22s cubic-bezier(0.4,0,0.2,1); }
    [data-theme="dark"] { --text-dark:#F0F0F0; --text-mid:#BBBBBB; --text-light:#888; --bg:#0F0F0F; --bg-white:#1C1C1C; --border:#2E2E2E; --shadow:0 8px 40px rgba(0,0,0,0.4); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text-dark); min-height:100vh; display:flex; flex-direction:column; transition:background var(--transition),color var(--transition); }
    nav { position:sticky; top:0; z-index:100; background:var(--bg-white); border-bottom:1px solid var(--border); padding:0 48px; height:64px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 12px rgba(0,0,0,0.04); transition:background var(--transition),border-color var(--transition); }
    .nav-logo { display:flex; align-items:center; gap:8px; text-decoration:none; font-family:'Clash Display',sans-serif; font-weight:700; font-size:20px; color:var(--text-dark); }
    .nav-logo svg { color:var(--orange); }
    .dark-toggle { background:none; border:none; cursor:pointer; color:var(--text-mid); padding:6px; border-radius:50%; display:flex; align-items:center; }
    .dark-toggle:hover { color:var(--orange); }
    main { flex:1; display:flex; align-items:center; justify-content:center; padding:48px 24px; }
    .form-card { background:var(--bg-white); border-radius:var(--radius); box-shadow:var(--shadow); padding:44px 44px 40px; width:100%; max-width:440px; animation:fadeUp 0.6s ease both; transition:background var(--transition); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .form-icon { font-size:48px; text-align:center; margin-bottom:12px; }
    .form-card h1 { font-family:'Clash Display',sans-serif; font-size:26px; font-weight:700; color:var(--text-dark); text-align:center; margin-bottom:6px; }
    .subtitle { font-size:14px; color:var(--text-light); text-align:center; margin-bottom:28px; line-height:1.6; }
    .field { margin-bottom:18px; }
    label { display:block; font-size:13.5px; font-weight:600; color:var(--text-mid); margin-bottom:6px; }
    .input-wrap { position:relative; }
    input[type=password], input[type=text] { width:100%; padding:12px 44px 12px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:14.5px; font-family:inherit; background:var(--bg-white); color:var(--text-dark); outline:none; transition:border-color var(--transition); }
    input:focus { border-color:var(--orange); }
    .eye-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; color:var(--text-light); }
    .btn-submit { width:100%; padding:13px; background:var(--orange); color:#fff; border:none; border-radius:var(--radius-sm); font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:4px; transition:background var(--transition),transform var(--transition); }
    .btn-submit:hover { background:var(--orange-dark); transform:translateY(-1px); }
    .btn-submit:disabled { opacity:0.7; cursor:not-allowed; transform:none; }
    .success-box { background:#ECFDF5; border:1.5px solid #6EE7B7; border-radius:var(--radius-sm); padding:16px; text-align:center; color:#065F46; font-size:14px; margin-top:18px; display:none; }
    .error-box { background:#FEF2F2; border:1.5px solid #FCA5A5; border-radius:var(--radius-sm); padding:16px; text-align:center; color:#991B1B; font-size:14px; margin-top:18px; display:none; }
    .no-token { text-align:center; padding:20px 0; }
    .no-token p { color:#991B1B; margin-bottom:12px; }
    .no-token a { color:var(--orange); text-decoration:none; font-weight:600; }
    .back-link { display:block; text-align:center; margin-top:20px; font-size:13.5px; color:var(--text-light); text-decoration:none; }
    .back-link:hover { color:var(--orange); }
    footer { background:var(--bg-white); border-top:1px solid var(--border); padding:20px 48px; display:flex; align-items:center; justify-content:space-between; font-size:13px; color:var(--text-light); transition:background var(--transition); }
    .footer-logo { display:flex; align-items:center; gap:6px; text-decoration:none; font-weight:700; color:var(--orange); }
    .footer-links { display:flex; gap:16px; }
    .footer-links a { color:var(--text-light); text-decoration:none; }
    .footer-links a:hover { color:var(--orange); }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      EventSphere
    </a>
    <div>
      <button class="dark-toggle" id="darkToggle">
        <svg id="darkIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <main>
    <div class="form-card">
      <div id="noToken" class="no-token" style="display:none">
        <p>❌ Invalid or missing reset token.</p>
        <a href="forgot-password.html">Request a new reset link</a>
      </div>

      <div id="formSection">
        <div class="form-icon">🔑</div>
        <h1>Reset Password</h1>
        <p class="subtitle">Choose a strong new password for your account.</p>

        <div class="field">
          <label for="newPass">New Password</label>
          <div class="input-wrap">
            <input type="password" id="newPass" placeholder="Min 6 characters" autocomplete="new-password"/>
            <button class="eye-btn" onclick="toggleVis('newPass',this)" type="button">👁</button>
          </div>
        </div>

        <div class="field">
          <label for="confPass">Confirm Password</label>
          <div class="input-wrap">
            <input type="password" id="confPass" placeholder="Repeat your password" autocomplete="new-password"/>
            <button class="eye-btn" onclick="toggleVis('confPass',this)" type="button">👁</button>
          </div>
        </div>

        <button class="btn-submit" id="submitBtn" onclick="handleReset()">Reset Password</button>
        <div class="success-box" id="successBox">✅ Password reset! Redirecting to login…</div>
        <div class="error-box" id="errorBox"></div>
        <a href="login.html" class="back-link">← Back to Login</a>
      </div>
    </div>
  </main>

  <footer>
    <a href="index.html" class="footer-logo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      EventSphere
    </a>
    <p>© 2026 EventSphere. All rights reserved.</p>
    <div class="footer-links"><a href="about.html">About</a><a href="contact.html">Contact</a></div>
  </footer>

  <script>
    const BURL = localStorage.getItem('backendURL') || (window.location.port==='5000'||window.location.port==='3000' ? '' : 'http://localhost:5000');

    // Dark mode
    const html=document.documentElement, toggle=document.getElementById('darkToggle'), icon=document.getElementById('darkIcon');
    const sun=`<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>`;
    const moon=`<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
    if(localStorage.getItem('theme')==='dark'){html.setAttribute('data-theme','dark');icon.innerHTML=sun;}
    toggle.addEventListener('click',()=>{const d=html.getAttribute('data-theme')==='dark';d?html.removeAttribute('data-theme'):html.setAttribute('data-theme','dark');icon.innerHTML=d?moon:sun;localStorage.setItem('theme',d?'light':'dark');});

    // Check token
    const token = new URLSearchParams(location.search).get('token');
    if (!token) {
      document.getElementById('noToken').style.display='block';
      document.getElementById('formSection').style.display='none';
    }

    function toggleVis(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁' : '🙈';
    }

    async function handleReset() {
      const pass = document.getElementById('newPass').value;
      const conf = document.getElementById('confPass').value;
      const btn  = document.getElementById('submitBtn');
      const succ = document.getElementById('successBox');
      const err  = document.getElementById('errorBox');
      succ.style.display='none'; err.style.display='none';
      if (pass.length < 6) { err.textContent='Password must be at least 6 characters.'; err.style.display='block'; return; }
      if (pass !== conf)   { err.textContent='Passwords do not match.'; err.style.display='block'; return; }
      btn.disabled=true; btn.textContent='Resetting…';
      try {
        const r = await fetch(BURL+'/api/auth/reset-password', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ token, password: pass })
        });
        const d = await r.json();
        if (!r.ok) {
          err.textContent = d.message || '❌ Link expired. Request a new one.';
          err.style.display='block';
          btn.disabled=false; btn.textContent='Reset Password';
          return;
        }
        succ.style.display='block';
        btn.textContent='Done ✓';
        setTimeout(() => { location.href='login.html'; }, 2000);
      } catch(e) {
        err.textContent='Network error. Please try again.'; err.style.display='block';
        btn.disabled=false; btn.textContent='Reset Password';
      }
    }

    document.getElementById('confPass').addEventListener('keydown', e => { if(e.key==='Enter') handleReset(); });
  </script>
</body>
</html>
